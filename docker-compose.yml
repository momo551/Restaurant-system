version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: restaurant_user
      POSTGRES_PASSWORD: restaurant_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    volumes:
      - ./backend/media:/app/media
      - ./backend/staticfiles:/app/staticfiles
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=restaurant_db
      - DB_USER=restaurant_user
      - DB_PASSWORD=restaurant_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - SECRET_KEY=development-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A core worker -l info --concurrency=2
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=restaurant_db
      - DB_USER=restaurant_user
      - DB_PASSWORD=restaurant_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - backend
      - redis

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=restaurant_db
      - DB_USER=restaurant_user
      - DB_PASSWORD=restaurant_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  customer-website:
    build:
      context: ./customer-website
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    restart: always
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
